name: CI

on:
  pull_request:
    push:
      branches: [ main ]
  permissions:
    contents: read
  jobs:
    verify-generated-sources:
      uses: ./.github/workflow/verify-generated.yml
    build:
      runs-on: ubuntu-latest
      needs: verify-generated-sources
      steps:
        - name: ⬇️ Check out repository
          uses: actions/checkout@v4
        - name: ☕ Set up JDK 21
          uses: actions/setup-java@v4
          with:
            distribution: temurin
            java-version: '21'
            cache: gradle
        - name: 🐘 Set up Gradle
          uses: gradle/actions/setup-gradle@v4
        - name: 🏗️ Build
          run: ./gradlew --no-daemon build
