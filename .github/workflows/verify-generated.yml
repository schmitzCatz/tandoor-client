name: Verify Generated Sources

on:
  workflow_call:

permissions:
  contents: read

jobs:
  verify-generated-sources:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Check out repository
        uses: actions/checkout@v5
      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: 🐘 Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: ⚙️ Regenerate OpenAPI client
        run: ./gradlew --no-daemon openApiGenerate
      - name: 🔍 Verify generated sources are committed
        run: |
          if ! git diff --quiet -- src/generated/openapi; then
            echo "Generated OpenAPI sources are not up to date."
            echo "Please run './gradlew openApiGenerate' and commit the changes."
            git --no-pager diff -- src/generated/openapi
            exit 1
          fi